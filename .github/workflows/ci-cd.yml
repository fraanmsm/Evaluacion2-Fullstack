name: Java CI con Maven

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Configurar Java JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Compilar y evaluar API Camas
      run: |
        cd api-camas/api-camas/api-camas
        chmod +x mvnw
        ./mvnw clean test

    - name: Compilar y evaluar API Triage
      run: |
        cd api-triage/api-triage/api-triage
        chmod +x mvnw
        ./mvnw clean test
